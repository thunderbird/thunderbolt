[package]
name = "mozilla-assist"
version = "0.1.0"
description = "A Tauri App"
authors = ["you"]
edition = "2021"
default-run = "mozilla-assist"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "mozilla_assist_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "mozilla-assist"
path = "src/main.rs"

[[bin]]
name = "imap"
path = "examples/imap.rs"

[[bin]]
name = "imap-idle"
path = "examples/imap-idle.rs"

[[bin]]
name = "embed"
path = "examples/embed.rs"

[[bin]]
name = "mistral"
path = "examples/mistral.rs"

[[bin]]
name = "embed-many"
path = "examples/embed-many.rs"

[[bin]]
name = "summarize-many"
path = "examples/summarize-many.rs"

[[bin]]
name = "seaorm"
path = "examples/seaorm.rs"

[build-dependencies]
tauri-build = { version = "2", features = ["isolation"] }

[dependencies]
tauri = { version = "2", features = ["isolation"] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
imap = "3.0.0-alpha.15"
native-tls = "0.2.14"
dotenv = "0.15.0"
candle-nn = { version = "0.8.3", features = ["metal"] }
candle-core = { version = "0.8.3", features = ["metal"] }
candle-transformers = { version = "0.8.3", features = ["metal"] }
hf-hub = "0.4.1"
tokenizers = "0.21.0"
anyhow = "1.0.96"
mistralrs = { path = "workspace/mistral.rs/mistralrs", features = ["metal"] }
tokio = "1.43.0"
mailparse = "0.16.0"
sea-orm = { version = "1.1.0", features = [
    "sqlx-sqlite",
    "runtime-tokio-rustls",
    "macros"
] }

[profile.dev]
incremental = true # Compile your binary in smaller steps.

[profile.release]
codegen-units = 1 # Allows LLVM to perform better optimization.
lto = true # Enables link-time-optimizations.
opt-level = "s" # Prioritizes small binary size. Use `3` if you prefer speed.
panic = "abort" # Higher performance by disabling panic handlers.
strip = true # Ensures debug symbols are removed.
