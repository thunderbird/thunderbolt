apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    {{- include "thunderbolt.labels" . | nindent 4 }}
spec:
  selector:
    app: backend
  ports:
    - port: {{ .Values.backend.service.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    {{- include "thunderbolt.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      {{- include "thunderbolt.podAnnotations" (dict "component" .Values.backend "root" .) | nindent 6 }}
    spec:
      {{- include "thunderbolt.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "8000"
            - name: AUTH_MODE
              value: {{ .Values.backend.env.authMode }}
            - name: WAITLIST_ENABLED
              value: {{ .Values.backend.env.waitlistEnabled | quote }}
            - name: DATABASE_DRIVER
              value: {{ .Values.backend.env.databaseDriver }}
            # THUNDERBOLT_POSTGRES_PASSWORD must appear before DATABASE_URL so the
            # `$(THUNDERBOLT_POSTGRES_PASSWORD)` substitution resolves (Kubernetes
            # dependent environment variables — earlier entries are interpolated into
            # later ones via `$(VAR)`, which is k8s syntax, not the shell).
            #
            # The name is intentionally namespaced: bare `POSTGRES_PASSWORD` is
            # auto-consumed by libpq tools (psql, pgcli, pg_dump). A future sidecar
            # or `kubectl exec` in this pod would silently inherit superuser
            # credentials. Namespacing prevents that.
            #
            # NOTE: the decoded postgres password must be URL-safe. URL-reserved
            # chars (`@:/?#`) silently break this DATABASE_URL (and the equivalent
            # URIs in templates/powersync.yaml).
            - name: THUNDERBOLT_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: thunderbolt-secrets
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgres.credentials.user }}:$(THUNDERBOLT_POSTGRES_PASSWORD)@postgres:5432/{{ .Values.postgres.credentials.database }}?sslmode={{ .Values.postgres.sslmode | default "disable" }}"
            # OIDC_ISSUER must equal what Keycloak puts in the `iss` claim of issued tokens —
            # i.e. the browser-facing URL. The backend reaches Keycloak in-cluster via OIDC_DISCOVERY_URL.
            - name: OIDC_ISSUER
              value: "{{ .Values.appUrl }}/realms/thunderbolt"
            - name: OIDC_DISCOVERY_URL
              value: "http://keycloak:8080/realms/thunderbolt/.well-known/openid-configuration"
            - name: OIDC_CLIENT_ID
              value: {{ .Values.keycloak.oidc.clientId }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: thunderbolt-secrets
                  key: oidc-client-secret
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: thunderbolt-secrets
                  key: better-auth-secret
            - name: BETTER_AUTH_URL
              value: {{ .Values.appUrl }}
            - name: APP_URL
              value: {{ .Values.appUrl }}
            # The internal Keycloak hostname is included so Better Auth's SSO plugin
            # trusts OIDC_DISCOVERY_URL when fetching the discovery doc server-to-server
            # (see backend/src/auth/auth.ts where `trustedOrigins` is consumed).
            #
            # CSRF protection is not weakened by this entry: the `Origin` request header
            # is on the Fetch-spec Forbidden Header list, so JS in a browser cannot forge
            # it. Browser-mediated attackers can only present their own page's real Origin.
            # Primary CSRF defenses (SameSite cookies + `X-Challenge-Token` custom header
            # on sensitive endpoints) are unaffected.
            - name: TRUSTED_ORIGINS
              value: "{{ .Values.appUrl }},http://keycloak:8080"
            - name: CORS_ORIGINS
              value: {{ .Values.appUrl }}
            - name: POWERSYNC_URL
              value: "http://powersync:{{ .Values.powersync.service.port }}"
            - name: POWERSYNC_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: thunderbolt-secrets
                  key: powersync-jwt-secret
            - name: POWERSYNC_JWT_KID
              value: {{ .Values.powersync.jwt.kid }}
            - name: RATE_LIMIT_ENABLED
              value: {{ .Values.backend.env.rateLimitEnabled | quote }}
            - name: THUNDERBOLT_INFERENCE_URL
              value: {{ .Values.backend.env.thunderboltInferenceUrl | default "" | quote }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: thunderbolt-secrets
                  key: anthropic-api-key
            - name: FIREWORKS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: thunderbolt-secrets
                  key: fireworks-api-key
            - name: MISTRAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: thunderbolt-secrets
                  key: mistral-api-key
            - name: THUNDERBOLT_INFERENCE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: thunderbolt-secrets
                  key: thunderbolt-inference-api-key
            - name: EXA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: thunderbolt-secrets
                  key: exa-api-key
          {{- include "thunderbolt.resources" .Values.backend.resources | nindent 10 }}
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
