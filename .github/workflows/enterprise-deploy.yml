name: Enterprise Deploy

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - deploy
          - destroy
      platform:
        description: 'Deployment platform'
        required: true
        type: choice
        default: 'fargate'
        options:
          - fargate
          - k8s
      region:
        description: 'AWS region'
        required: true
        type: choice
        default: 'us-east-1'
        options:
          - us-east-1
          - us-west-2
          - eu-west-1
      stack_name:
        description: 'Pulumi stack name (e.g., demo-acme)'
        required: true
        type: string

env:
  PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

jobs:
  deploy:
    if: inputs.action == 'deploy'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ inputs.region }}

      - name: Install Pulumi dependencies
        working-directory: deploy/pulumi
        run: bun install --frozen-lockfile

      - name: Set platform config
        working-directory: deploy/pulumi
        run: pulumi config set platform "$PLATFORM" -s "$STACK_NAME" --non-interactive
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          PLATFORM: ${{ inputs.platform }}
          STACK_NAME: ${{ inputs.stack_name }}

      - name: Deploy
        uses: pulumi/actions@8582a9e8cc630786854029b4e09281acd6794b58 # v6
        with:
          command: up
          stack-name: ${{ inputs.stack_name }}
          work-dir: deploy/pulumi
          upsert: true
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

      - name: Print outputs
        working-directory: deploy/pulumi
        run: pulumi stack output --json -s "$STACK_NAME"
        env:
          STACK_NAME: ${{ inputs.stack_name }}

  destroy:
    if: inputs.action == 'destroy'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ inputs.region }}

      - name: Install Pulumi dependencies
        working-directory: deploy/pulumi
        run: bun install --frozen-lockfile

      - name: Destroy
        uses: pulumi/actions@8582a9e8cc630786854029b4e09281acd6794b58 # v6
        with:
          command: destroy
          stack-name: ${{ inputs.stack_name }}
          work-dir: deploy/pulumi
          remove: true
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
