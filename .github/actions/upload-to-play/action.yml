name: 'Upload to Google Play Store'
description: 'Upload AAB file to Google Play Store using service account'
inputs:
  serviceAccountJson:
    description: 'Google Play service account JSON'
    required: true
  packageName:
    description: 'Android package name'
    required: true
  aabPath:
    description: 'Path to the AAB file'
    required: true
  track:
    description: 'Release track (internal, alpha, beta, production)'
    required: false
    default: 'internal'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'
        cache: 'npm'

    - name: Install dependencies
      run: npm install googleapis

    - name: Upload to Google Play Store
      shell: bash
      run: |
        SERVICE_ACCOUNT_JSON="${{ inputs.serviceAccountJson }}" \
        PACKAGE_NAME="${{ inputs.packageName }}" \
        AAB_PATH="${{ inputs.aabPath }}" \
        TRACK="${{ inputs.track }}" \
        node scripts/upload-to-play.js
