apiVersion: v1
kind: Service
metadata:
  name: powersync
  labels:
    {{- include "thunderbolt.labels" . | nindent 4 }}
spec:
  selector:
    app: powersync
  ports:
    - port: {{ .Values.powersync.service.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: powersync
  labels:
    {{- include "thunderbolt.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.powersync.replicas }}
  selector:
    matchLabels:
      app: powersync
  template:
    metadata:
      labels:
        app: powersync
    spec:
      {{- include "thunderbolt.imagePullSecrets" . | nindent 6 }}
      initContainers:
        - name: wait-for-mongo-rs
          image: "{{ .Values.mongo.image.repository }}:{{ .Values.mongo.image.tag }}"
          command:
            - bash
            - -c
            - |
              until mongosh --host mongo:27017 --eval "db.adminCommand('ping')" > /dev/null 2>&1; do
                echo "Waiting for mongo..."
                sleep 2
              done
              mongosh --host mongo:27017 --eval '
                try { rs.status().ok && quit(0) } catch(e) {}
                rs.initiate({_id: "rs0", version: 1, members: [{_id: 0, host: "mongo-0.mongo:27017"}]})
              '
              until mongosh --host mongo:27017 --eval "exit(rs.status().myState === 1 ? 0 : 1)"; do
                echo "Waiting for replica set primary..."
                sleep 2
              done
      containers:
        - name: powersync
          image: "{{ .Values.powersync.image.repository }}:{{ .Values.powersync.image.tag }}"
          args: ["start", "-r", "unified"]
          ports:
            - containerPort: 8080
          env:
            - name: POWERSYNC_CONFIG_PATH
              value: /config/config.yaml
            - name: POWERSYNC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: thunderbolt-secrets
                  key: powersync-db-password
            - name: PS_PG_URI
              value: "postgresql://powersync_role:$(POWERSYNC_DB_PASSWORD)@postgres:5432/{{ .Values.postgres.credentials.database }}"
            - name: PS_MONGO_URI
              value: "mongodb://mongo:27017/powersync"
          volumeMounts:
            - name: config
              mountPath: /config
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: powersync-config
