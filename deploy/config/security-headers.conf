# Security headers for HTML + asset responses.
# Included from every location block to avoid nginx's add_header inheritance quirk:
# a child location with any add_header silently drops all parent add_headers.
# Do NOT add add_header directives at the server {} level.
# nosemgrep tags below: the header-redefinition rule fires on any add_header
# inside (or pulled into) a location block. We deliberately put the headers
# here — never at server level — so nothing is silently dropped.
# `credentialless` (not `require-corp`) so cross-origin no-cors embeds like
# third-party preview images load without requiring upstream CORP headers.
# Under credentialless mode the browser sends no-cors cross-origin requests
# with credentials omitted (no cookies, no HTTP auth) — CORS-mode requests are
# unaffected. Cross-origin isolation is still in effect (SharedArrayBuffer /
# OPFS sync VFS work). If you ever need an authenticated cross-origin embed,
# switch that request to CORS mode rather than tightening this back to
# `require-corp`.
# nosemgrep: generic.nginx.security.header-redefinition.header-redefinition
add_header Cross-Origin-Embedder-Policy "credentialless" always;
# nosemgrep: generic.nginx.security.header-redefinition.header-redefinition
add_header Cross-Origin-Opener-Policy "same-origin" always;
# nosemgrep: generic.nginx.security.header-redefinition.header-redefinition
add_header X-Frame-Options "DENY" always;
# nosemgrep: generic.nginx.security.header-redefinition.header-redefinition
add_header Content-Security-Policy "frame-ancestors 'none'" always;
# nosemgrep: generic.nginx.security.header-redefinition.header-redefinition
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
