# -- Global image pull secrets for private registries (e.g. GHCR)
imagePullSecrets: []
# - name: ghcr-pull

# -- Base URL the app is served from (used for CORS, redirects, auth callbacks)
appUrl: http://localhost

# =============================================================================
# Frontend
# =============================================================================
frontend:
  image:
    repository: ghcr.io/your-org/thunderbolt/frontend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    port: 80

# =============================================================================
# Marketing (Astro static site: landing page, blog, docs)
# =============================================================================
marketing:
  image:
    repository: ghcr.io/your-org/thunderbolt/marketing
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    port: 80

# =============================================================================
# Backend
# =============================================================================
backend:
  image:
    repository: ghcr.io/your-org/thunderbolt/backend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    port: 8000
  # -- Base64-encoded Better Auth secret (REQUIRED — no safe default)
  # Generate with: echo -n "your-secret" | base64
  betterAuthSecretBase64: ""
  env:
    authMode: oidc
    waitlistEnabled: "false"
    databaseDriver: postgres
    rateLimitEnabled: "false"
    # -- Thunderbolt inference gateway URL (plaintext; empty disables the provider)
    thunderboltInferenceUrl: ""
  # -- Base64-encoded AI provider keys. Empty defaults disable each provider
  # (backend zod schema treats empty string as "not configured").
  # Generate each with: echo -n "<your-key>" | base64
  aiSecrets:
    anthropicApiKeyBase64: ""
    fireworksApiKeyBase64: ""
    mistralApiKeyBase64: ""
    thunderboltInferenceApiKeyBase64: ""
    exaApiKeyBase64: ""

# =============================================================================
# PostgreSQL
# =============================================================================
postgres:
  image:
    repository: postgres
    tag: 17-alpine
  storage: 5Gi
  credentials:
    user: postgres
    database: postgres
    # -- Base64-encoded password (default: "postgres")
    passwordBase64: cG9zdGdyZXM=

# =============================================================================
# PowerSync
# =============================================================================
powersync:
  image:
    repository: journeyapps/powersync-service
    tag: latest
  replicas: 1
  service:
    port: 8080
  jwt:
    kid: enterprise-powersync
    # -- Base64-encoded JWT secret. Minimum 32 chars when decoded (backend validation).
    # Default: "enterprise-thunderbolt-powersync-jwt-default-secret" (51 chars).
    # Override for production: echo -n "<your-secret>" | base64
    secretBase64: ZW50ZXJwcmlzZS10aHVuZGVyYm9sdC1wb3dlcnN5bmMtand0LWRlZmF1bHQtc2VjcmV0
  db:
    # -- Base64-encoded powersync_role database password (default: "myhighlyrandompassword")
    passwordBase64: bXloaWdobHlyYW5kb21wYXNzd29yZA==

# =============================================================================
# Keycloak (OIDC Identity Provider)
# =============================================================================
keycloak:
  image:
    repository: quay.io/keycloak/keycloak
    tag: "26.0"
  replicas: 1
  service:
    port: 8080
  admin:
    username: admin
    password: admin
  oidc:
    clientId: thunderbolt-app
    # -- Base64-encoded client secret (default: "thunderbolt-enterprise-secret")
    clientSecretBase64: dGh1bmRlcmJvbHQtZW50ZXJwcmlzZS1zZWNyZXQ=

# =============================================================================
# Ingress
# =============================================================================
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
  # -- Set to your domain for production; leave empty for default rule
  host: ""
