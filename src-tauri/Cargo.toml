cargo-features = ["profile-rustflags"]

[package]
name = "thunderbolt"
version = "0.1.0"
description = "A Tauri App"
authors = ["you"]
edition = "2021"
default-run = "thunderbolt"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "thunderbolt_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[workspace]
members = ["thunderbolt_imap_client", "thunderbolt_imap_sync", "thunderbolt_embeddings"]

[workspace.dependencies]
libsql = { version = "0.6.0", features = ["encryption"] }
anyhow = "1.0.97"
serde = { version = "1.0.219", features = ["derive"] }
thunderbolt-lib = { path = "." }

[[bin]]
name = "thunderbolt"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2.0.6", features = ["isolation"] }

# Common dependencies (no Metal features)
[dependencies]
tauri = { version = "2.3.1", features = ["isolation", "tray-icon", "devtools"] }
tauri-plugin-opener = "2.2.6"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
imap = "3.0.0-alpha.15"
native-tls = "0.2.14"
dotenv = "0.15.0"
hf-hub = "0.4.2"
tokenizers = "0.21.1"
anyhow = "1.0.97"
tokio = "1.44.1"
chrono = { version = "0.4.39", features = ["serde"] }
html2text = "0.14.2"
tauri-plugin-devtools = "2.0.0"
tauri-plugin-http = "2"
tokio-stream = "0.1.17"
http = "1.3.1"
tauri-plugin-process = "2"
regex = "1.11.1"
keyring = { version = "3.6.2", features = [
    "apple-native",
    "windows-native",
    "sync-secret-service",
] }
tauri-plugin-fs = "2"
libsql = { git = "https://github.com/libsql/libsql.git", rev = "d980ce13b9c4b3f05b03dd1b9ca2fb2765c0cb68", features = [
    "encryption",
] }
base64 = "0.22.1"
bytes = "1.10.1"
mail-parser = { version = "0.10.2", features = ["serde_support"] }
thunderbolt_imap_client = { path = "./thunderbolt_imap_client" }
thunderbolt_imap_sync = { path = "./thunderbolt_imap_sync" }
thunderbolt_embeddings = { path = "./thunderbolt_embeddings" }
# MCP Server dependencies
axum = "0.7.4"
tower = "0.4.13"
tower-http = { version = "0.5.0", features = ["cors"] }
uuid = { version = "1.6.1", features = ["v4", "serde"] }
dashmap = "5.5.3"

[profile.dev]
incremental = true                              # Compile your binary in smaller steps.
rustflags = ["-C", "target-feature=+fp16,+fhm"]

[profile.dev.package]
"candle-nn" = { opt-level = 3, debug = false }
"candle-core" = { opt-level = 3, debug = false }
"candle-transformers" = { opt-level = 3, debug = false }
# "mistralrs" = { opt-level = 3, debug = false }

[profile.release]
codegen-units = 1 # Allows LLVM to perform better optimization.
lto = true        # Enables link-time-optimizations.
opt-level = "s"   # Prioritizes small binary size. Use `3` if you prefer speed.
panic = "abort"   # Higher performance by disabling panic handlers.
strip = true      # Ensures debug symbols are removed.
