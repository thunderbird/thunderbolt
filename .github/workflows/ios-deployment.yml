name: iOS Deployment

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (optional)'
        required: false
        type: string
      notify_testers:
        description: 'Notify external testers'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy_ios:
    runs-on: macos-latest
    environment: iOS Production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust nightly toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          cache: false
          rustflags: ''

      - name: Cache Cargo registry and build
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-ios-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ios-
            ${{ runner.os }}-cargo-

      - name: Install iOS target
        run: rustup target add aarch64-apple-ios

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true
          working-directory: src-tauri/gen/apple

      - name: Install Fastlane
        working-directory: src-tauri/gen/apple
        run: |
          bundle install

      - name: Setup Apple certificates and provisioning profiles
        working-directory: src-tauri/gen/apple
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          # Create certificates directory
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          # Decode and install certificate
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > certificate.p12

          # Create temporary keychain
          security create-keychain -p "temp-keychain-password" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "temp-keychain-password" build.keychain
          security list-keychains -d user -s build.keychain login.keychain

          # Import certificate to keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "temp-keychain-password" build.keychain

          # Install provisioning profile
          echo "$PROVISIONING_PROFILE" | base64 --decode > profile.mobileprovision
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

          # Clean up sensitive files
          rm certificate.p12 profile.mobileprovision

      - name: Setup App Store Connect API Key
        working-directory: src-tauri/gen/apple
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p fastlane
          echo "$APP_STORE_CONNECT_API_KEY" | base64 --decode > fastlane/AuthKey_$APP_STORE_CONNECT_API_KEY_ID.p8

      - name: Install frontend dependencies
        run: bun install

      - name: Build frontend
        run: bun run build
        env:
          VITE_THUNDERBOLT_CLOUD_URL: ${{ vars.VITE_THUNDERBOLT_CLOUD_URL }}

      - name: Generate Xcode project
        working-directory: src-tauri
        run: bun tauri ios init

      - name: Build and deploy to TestFlight
        working-directory: src-tauri/gen/apple
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          NOTIFY_TESTERS: ${{ github.event.inputs.notify_testers || 'false' }}
          VERSION_INPUT: ${{ github.event.inputs.version }}
        run: |
          echo "🧪 Building for TestFlight beta..."
          bundle exec fastlane beta

      - name: Upload build artifacts (if build fails)
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: ios-build-logs
          path: |
            src-tauri/gen/apple/fastlane/logs/
            src-tauri/gen/apple/*.log
            ~/Library/Logs/gym/

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain build.keychain || true

      - name: Clean up sensitive files
        if: always()
        working-directory: src-tauri/gen/apple
        run: |
          rm -f fastlane/AuthKey_*.p8
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Notify success
        if: success()
        run: |
          echo "🚀 iOS app successfully uploaded to TestFlight!"
          echo "Check App Store Connect for the new build."

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ iOS build failed. Check the logs above for details."
          echo "Common issues: certificate problems, provisioning profile issues, or build errors."
