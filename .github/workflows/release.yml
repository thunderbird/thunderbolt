name: Release
run-name: Release triggered by ${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Explicit version to set (e.g., 1.2.3). Leave empty for auto-detection.'
        required: false
        type: string
      version_type:
        description: 'Type of version bump (auto, patch, minor, major)'
        required: false
        type: choice
        default: 'auto'
        options:
          - auto
          - patch
          - minor
          - major

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  version_bump:
    name: Version Bump
    uses: ./.github/workflows/version-bump.yml
    secrets: inherit
    with:
      platform: 'all'
      version: ${{ inputs.version }}
      version_type: ${{ inputs.version_type }}

  desktop:
    name: Desktop Release
    needs: version_bump
    if: needs.version_bump.result == 'success'
    uses: ./.github/workflows/desktop-release.yml
    secrets: inherit
    with:
      version: ${{ needs.version_bump.outputs.new_version }}

  ios:
    name: iOS Release
    needs: version_bump
    if: needs.version_bump.result == 'success'
    uses: ./.github/workflows/ios-release.yml
    secrets: inherit
    with:
      version: ${{ needs.version_bump.outputs.new_version }}

  android:
    name: Android Release
    needs: version_bump
    if: needs.version_bump.result == 'success'
    uses: ./.github/workflows/android-release.yml
    secrets: inherit
    with:
      version: ${{ needs.version_bump.outputs.new_version }}
