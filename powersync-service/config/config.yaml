replication:
  connections:
    - type: postgresql
      uri: postgresql://powersync_role:myhighlyrandompassword@postgres:5432/postgres
      sslmode: disable

storage:
  type: postgresql
  uri: postgresql://postgres:postgres@postgres:5432/powersync_storage
  sslmode: disable

port: 8080

sync_rules:
  content: |
    bucket_definitions:
      # Account-level data — one bucket per user. Device list and user-scoped
      # settings. Workspaces and permissions are joined via the workspace bucket
      # below (PowerSync sync rules don't support IN (SELECT ...) subqueries).
      user_account:
        priority: 1
        parameters: SELECT request.user_id() as user_id
        data:
          - SELECT * FROM powersync.settings WHERE user_id = bucket.user_id
          - SELECT * FROM powersync.devices WHERE user_id = bucket.user_id

      # User-private workspace-scoped tables — parameterized by user_id so we can
      # filter without referencing request.user_id() inside the data query (which
      # PowerSync rejects). Rows for every workspace the user is a member of land
      # in the local DB; the FE narrows to the active workspace at query time.
      user_private:
        priority: 1
        parameters: SELECT request.user_id() as user_id
        data:
          - SELECT * FROM powersync.chat_threads WHERE user_id = bucket.user_id
          - SELECT * FROM powersync.chat_messages WHERE user_id = bucket.user_id
          - SELECT * FROM powersync.tasks WHERE user_id = bucket.user_id

      # Workspace essentials — one bucket per workspace the user is a member of.
      # Carries the workspace row itself and the permission policy. Promoted to
      # priority 1 so the workspace selector / sidebar and permission-gated UI
      # render on first paint without waiting for the heavier shared config.
      workspace_essentials:
        priority: 1
        parameters: SELECT workspace_id FROM powersync.workspace_memberships WHERE user_id = request.user_id()
        data:
          - SELECT * FROM powersync.workspaces WHERE id = bucket.workspace_id
          - SELECT * FROM powersync.workspace_permissions WHERE workspace_id = bucket.workspace_id

      # Workspace shared data — full member list and shared workspace-scoped config.
      workspace_data:
        priority: 2
        parameters: SELECT workspace_id FROM powersync.workspace_memberships WHERE user_id = request.user_id()
        data:
          - SELECT * FROM powersync.workspace_memberships WHERE workspace_id = bucket.workspace_id
          - SELECT * FROM powersync.models WHERE workspace_id = bucket.workspace_id
          - SELECT * FROM powersync.mcp_servers WHERE workspace_id = bucket.workspace_id
          - SELECT * FROM powersync.prompts WHERE workspace_id = bucket.workspace_id
          - SELECT * FROM powersync.skills WHERE workspace_id = bucket.workspace_id
          - SELECT * FROM powersync.triggers WHERE workspace_id = bucket.workspace_id
          - SELECT * FROM powersync.modes WHERE workspace_id = bucket.workspace_id
          - SELECT * FROM powersync.model_profiles WHERE workspace_id = bucket.workspace_id
          - SELECT * FROM powersync.agents WHERE workspace_id = bucket.workspace_id

      # Admin-only data — one bucket per workspace where the user is an admin.
      # Pending memberships sync down only to admins so they can manage invites.
      workspace_admin_data:
        priority: 2
        parameters: SELECT workspace_id FROM powersync.workspace_memberships WHERE user_id = request.user_id() AND role = 'admin'
        data:
          - SELECT * FROM powersync.workspace_pending_memberships WHERE workspace_id = bucket.workspace_id

client_auth:
  supabase: false
  audience: ['powersync-dev', 'powersync']
  jwks:
    keys:
      # HS256 key for local dev - must match backend POWERSYNC_JWT_SECRET (raw) and POWERSYNC_JWT_KID
      # k is base64 of the shared secret
      - kty: oct
        k: cG93ZXJzeW5jLWRldi1zZWNyZXQtY2hhbmdlLWluLXByb2R1Y3Rpb24=
        alg: HS256
        kid: powersync-dev
  telemetry:
    disable_telemetry_sharing: false
