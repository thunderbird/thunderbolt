name: Preview Environment Reconcile

# Safety-net cron that reconciles Pulumi preview stacks against GitHub PR state.
# Normal teardown happens via preview-teardown.yml on PR close. This workflow
# catches orphans — stacks that weren't cleaned up due to a failed teardown run
# or a closed PR that missed the webhook.
#
# Destroys any `preview-pr-*` stack whose PR is closed, OR whose stack is older
# than RECONCILE_MAX_AGE_DAYS regardless of PR state (cost guardrail).

on:
  schedule:
    # 05:00 UTC daily (midnight EST, late enough that Pacific maintainers have
    # usually finished overnight work)
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'If true, log orphans without destroying them'
        type: boolean
        default: false

env:
  RECONCILE_MAX_AGE_DAYS: 3

permissions:
  contents: read
  id-token: write

jobs:
  find-orphans:
    runs-on: ubuntu-latest
    outputs:
      stacks_to_destroy: ${{ steps.reconcile.outputs.stacks_to_destroy }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install Pulumi
        uses: pulumi/actions@8582a9e8cc630786854029b4e09281acd6794b58 # v6
        with:
          command: version
          work-dir: deploy/pulumi

      - name: Install Pulumi dependencies
        working-directory: deploy/pulumi
        run: bun install --frozen-lockfile

      - name: Reconcile preview stacks against open PRs
        id: reconcile
        working-directory: deploy/pulumi
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_AGE_DAYS: ${{ env.RECONCILE_MAX_AGE_DAYS }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail

          # List all stacks in the project; filter to preview-pr-*
          # Fetch once and filter locally — avoids N Pulumi API calls in the loop.
          ALL_STACKS_JSON=$(pulumi stack ls --all --json)
          PREVIEW_STACKS=$(echo "$ALL_STACKS_JSON" | jq -r '.[] | select(.name|test("^preview-pr-[0-9]+$")) | .name')

          if [ -z "$PREVIEW_STACKS" ]; then
            echo "No preview stacks found. Nothing to reconcile."
            echo "stacks_to_destroy=[]" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Fetch open PR numbers from GitHub for cross-reference
          OPEN_PRS=$(gh pr list --state open --limit 200 --json number --jq '.[].number')

          ORPHANS=()
          NOW_EPOCH=$(date +%s)
          MAX_AGE_SECONDS=$(( MAX_AGE_DAYS * 86400 ))

          for STACK in $PREVIEW_STACKS; do
            PR_NUM=$(echo "$STACK" | sed 's/^preview-pr-//')
            LAST_UPDATE=$(echo "$ALL_STACKS_JSON" | jq -r ".[] | select(.name==\"$STACK\") | .lastUpdate // empty")

            REASON=""

            # Check 1: PR closed?
            if ! echo "$OPEN_PRS" | grep -qx "$PR_NUM"; then
              REASON="PR #$PR_NUM is closed"
            fi

            # Check 2: stack too old?
            if [ -z "$REASON" ] && [ -n "$LAST_UPDATE" ]; then
              UPDATE_EPOCH=$(date -d "$LAST_UPDATE" +%s 2>/dev/null || echo "$NOW_EPOCH")
              AGE=$((NOW_EPOCH - UPDATE_EPOCH))
              if [ "$AGE" -gt "$MAX_AGE_SECONDS" ]; then
                REASON="stack age $((AGE / 86400))d > max ${MAX_AGE_DAYS}d (PR #$PR_NUM still open but preview is stale)"
              fi
            fi

            if [ -n "$REASON" ]; then
              echo "ORPHAN: $STACK — $REASON"
              ORPHANS+=("$PR_NUM")
            else
              echo "KEEP: $STACK — PR #$PR_NUM is open and stack is fresh"
            fi
          done

          # Emit as JSON array for the downstream matrix job
          if [ ${#ORPHANS[@]} -eq 0 ]; then
            echo "stacks_to_destroy=[]" >> $GITHUB_OUTPUT
          else
            printf -v JSON '[%s]' "$(printf '"%s",' "${ORPHANS[@]}" | sed 's/,$//')"
            echo "stacks_to_destroy=$JSON" >> $GITHUB_OUTPUT
            echo "Will destroy ${#ORPHANS[@]} stack(s): $JSON"
          fi

          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN — not actually destroying"
            echo "stacks_to_destroy=[]" >> $GITHUB_OUTPUT
          fi

  destroy-orphan:
    needs: find-orphans
    if: ${{ needs.find-orphans.outputs.stacks_to_destroy != '[]' && needs.find-orphans.outputs.stacks_to_destroy != '' }}
    strategy:
      fail-fast: false
      matrix:
        pr_number: ${{ fromJSON(needs.find-orphans.outputs.stacks_to_destroy) }}
    uses: ./.github/workflows/enterprise-deploy.yml
    with:
      action: destroy
      platform: fargate
      region: us-east-1
      stack_name: preview-pr-${{ matrix.pr_number }}
    secrets: inherit
