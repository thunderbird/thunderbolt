replication:
  connections:
    - type: postgresql
      uri: !env PS_PG_URI
      sslmode: disable

storage:
  type: postgresql
  uri: !env PS_STORAGE_URI
  sslmode: disable

port: 8080

sync_rules:
  content: |
    bucket_definitions:
      user_essentials:
        priority: 1
        parameters: SELECT request.user_id() as user_id
        data:
          - SELECT * FROM powersync.settings WHERE user_id = bucket.user_id
          - SELECT * FROM powersync.models WHERE user_id = bucket.user_id
          - SELECT * FROM powersync.modes WHERE user_id = bucket.user_id
          - SELECT * FROM powersync.model_profiles WHERE user_id = bucket.user_id
          - SELECT * FROM powersync.devices WHERE user_id = bucket.user_id
          - SELECT * FROM powersync.chat_threads WHERE user_id = bucket.user_id
      user_data:
        priority: 2
        parameters: SELECT request.user_id() as user_id
        data:
          - SELECT * FROM powersync.chat_messages WHERE user_id = bucket.user_id
          - SELECT * FROM powersync.tasks WHERE user_id = bucket.user_id
          - SELECT * FROM powersync.prompts WHERE user_id = bucket.user_id
          - SELECT * FROM powersync.skills WHERE user_id = bucket.user_id
          - SELECT * FROM powersync.triggers WHERE user_id = bucket.user_id
          - SELECT * FROM powersync.agents WHERE user_id = bucket.user_id

client_auth:
  supabase: false
  audience: ['powersync-enterprise', 'powersync']
  jwks:
    keys:
      - kty: oct
        # Both k (secret) and kid (label) are env-driven so the same image can serve
        # multiple environments without a rebuild. Must match the values the backend
        # signs with: k = base64(POWERSYNC_JWT_SECRET), kid = POWERSYNC_JWT_KID.
        # The PS_ prefix is mandatory — PowerSync's YAML loader rejects !env
        # substitutions for variables that don't start with it (security guardrail).
        # Backend validates the underlying secret is >=32 chars when decoded.
        k: !env PS_JWT_KEY_BASE64
        alg: HS256
        kid: !env PS_JWT_KID
  telemetry:
    disable_telemetry_sharing: true
