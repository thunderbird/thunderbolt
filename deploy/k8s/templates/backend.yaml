apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    {{- include "thunderbolt.labels" . | nindent 4 }}
spec:
  selector:
    app: backend
  ports:
    - port: {{ .Values.backend.service.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    {{- include "thunderbolt.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      {{- include "thunderbolt.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "8000"
            - name: AUTH_MODE
              value: {{ .Values.backend.env.authMode }}
            - name: WAITLIST_ENABLED
              value: {{ .Values.backend.env.waitlistEnabled | quote }}
            - name: DATABASE_DRIVER
              value: {{ .Values.backend.env.databaseDriver }}
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgres.credentials.user }}:{{ .Values.postgres.credentials.passwordBase64 | b64dec }}@postgres:5432/{{ .Values.postgres.credentials.database }}"
            - name: OIDC_ISSUER
              value: "http://keycloak:8080/realms/thunderbolt"
            - name: OIDC_CLIENT_ID
              value: {{ .Values.keycloak.oidc.clientId }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: thunderbolt-secrets
                  key: oidc-client-secret
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: thunderbolt-secrets
                  key: better-auth-secret
            - name: BETTER_AUTH_URL
              value: {{ .Values.appUrl }}
            - name: APP_URL
              value: {{ .Values.appUrl }}
            - name: TRUSTED_ORIGINS
              value: {{ .Values.appUrl }}
            - name: CORS_ORIGINS
              value: {{ .Values.appUrl }}
            - name: POWERSYNC_URL
              value: "http://powersync:{{ .Values.powersync.service.port }}"
            - name: POWERSYNC_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: thunderbolt-secrets
                  key: powersync-jwt-secret
            - name: POWERSYNC_JWT_KID
              value: {{ .Values.powersync.jwt.kid }}
            - name: RATE_LIMIT_ENABLED
              value: {{ .Values.backend.env.rateLimitEnabled | quote }}
            - name: THUNDERBOLT_INFERENCE_URL
              value: {{ .Values.backend.env.thunderboltInferenceUrl | default "" | quote }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: thunderbolt-secrets
                  key: anthropic-api-key
            - name: FIREWORKS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: thunderbolt-secrets
                  key: fireworks-api-key
            - name: MISTRAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: thunderbolt-secrets
                  key: mistral-api-key
            - name: THUNDERBOLT_INFERENCE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: thunderbolt-secrets
                  key: thunderbolt-inference-api-key
            - name: EXA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: thunderbolt-secrets
                  key: exa-api-key
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
