name: Enterprise Deploy

on:
  workflow_call:
    inputs:
      action:
        type: string
        required: true
      platform:
        type: string
        default: 'fargate'
      region:
        type: string
        default: 'us-east-1'
      stack_name:
        type: string
        required: true
      version:
        type: string
        required: false
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - deploy
          - destroy
      platform:
        description: 'Deployment platform'
        required: true
        type: choice
        default: 'fargate'
        options:
          - fargate
          - k8s
      region:
        description: 'AWS region'
        required: true
        type: choice
        default: 'us-east-1'
        options:
          - us-east-1
          - us-west-2
          - eu-west-1
      stack_name:
        description: 'Pulumi stack name (e.g., demo-acme)'
        required: true
        type: string
      version:
        description: 'Image version to deploy (default: from package.json)'
        required: false
        type: string

env:
  PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

jobs:
  deploy:
    if: inputs.action == 'deploy'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ inputs.region }}

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT
          fi

      - name: Install Pulumi dependencies
        working-directory: deploy/pulumi
        run: bun install --frozen-lockfile

      - name: Configure Pulumi stack
        working-directory: deploy/pulumi
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          INPUT_PLATFORM: ${{ inputs.platform }}
          INPUT_STACK_NAME: ${{ inputs.stack_name }}
          INPUT_VERSION: ${{ steps.version.outputs.version }}
          INPUT_GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          pulumi config set platform "$INPUT_PLATFORM" -s "$INPUT_STACK_NAME" --non-interactive
          pulumi config set version "$INPUT_VERSION" -s "$INPUT_STACK_NAME" --non-interactive
          pulumi config set --secret ghcrToken "$INPUT_GHCR_PAT" -s "$INPUT_STACK_NAME" --non-interactive

      - name: Deploy
        uses: pulumi/actions@v6
        with:
          command: up
          stack-name: ${{ inputs.stack_name }}
          work-dir: deploy/pulumi
          upsert: true
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

      - name: Print outputs
        working-directory: deploy/pulumi
        env:
          INPUT_STACK_NAME: ${{ inputs.stack_name }}
        run: pulumi stack output --json -s "$INPUT_STACK_NAME"

  destroy:
    if: inputs.action == 'destroy'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ inputs.region }}

      - name: Install Pulumi dependencies
        working-directory: deploy/pulumi
        run: bun install --frozen-lockfile

      - name: Destroy
        uses: pulumi/actions@v6
        with:
          command: destroy
          stack-name: ${{ inputs.stack_name }}
          work-dir: deploy/pulumi
          remove: true
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
