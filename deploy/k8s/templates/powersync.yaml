apiVersion: v1
kind: Service
metadata:
  name: powersync
  labels:
    {{- include "thunderbolt.labels" . | nindent 4 }}
spec:
  selector:
    app: powersync
  ports:
    - port: {{ .Values.powersync.service.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: powersync
  labels:
    {{- include "thunderbolt.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.powersync.replicas }}
  selector:
    matchLabels:
      app: powersync
  template:
    metadata:
      labels:
        app: powersync
      {{- include "thunderbolt.podAnnotations" (dict "component" .Values.powersync "root" .) | nindent 6 }}
    spec:
      {{- include "thunderbolt.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: powersync
          image: "{{ .Values.powersync.image.repository }}:{{ .Values.powersync.image.tag }}"
          args: ["start", "-r", "unified"]
          ports:
            - containerPort: 8080
          env:
            - name: POWERSYNC_CONFIG_PATH
              value: /config/config.yaml
            - name: POWERSYNC_JWT_SECRET_B64
              valueFrom:
                secretKeyRef:
                  name: thunderbolt-secrets
                  key: powersync-jwt-secret-b64
            - name: POWERSYNC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: thunderbolt-secrets
                  key: powersync-db-password
            # Bare `POSTGRES_PASSWORD` would be auto-consumed by libpq tools
            # (psql, pg_dump) running in this pod, so we namespace it.
            - name: THUNDERBOLT_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: thunderbolt-secrets
                  key: postgres-password
            - name: PS_PG_URI
              value: "postgresql://powersync_role:$(POWERSYNC_DB_PASSWORD)@postgres:5432/{{ .Values.postgres.credentials.database }}"
            - name: PS_STORAGE_URI
              value: "postgresql://{{ .Values.postgres.credentials.user }}:$(THUNDERBOLT_POSTGRES_PASSWORD)@postgres:5432/powersync_storage"
          volumeMounts:
            - name: config
              mountPath: /config
          {{- include "thunderbolt.resources" .Values.powersync.resources | nindent 10 }}
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: powersync-config
