apiVersion: v1
kind: Service
metadata:
  name: keycloak
  labels:
    {{- include "thunderbolt.labels" . | nindent 4 }}
spec:
  selector:
    app: keycloak
  ports:
    - port: {{ .Values.keycloak.service.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  labels:
    {{- include "thunderbolt.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.keycloak.replicas }}
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      {{- include "thunderbolt.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: keycloak
          image: "{{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}"
          args: ["start-dev", "--import-realm"]
          ports:
            - containerPort: 8080
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: {{ .Values.keycloak.admin.username }}
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              value: {{ .Values.keycloak.admin.password }}
            - name: KC_HTTP_PORT
              value: "8080"
            - name: KC_HOSTNAME
              value: {{ .Values.appUrl }}
            - name: KC_HOSTNAME_BACKCHANNEL_DYNAMIC
              value: "true"
          volumeMounts:
            - name: realm
              mountPath: /opt/keycloak/data/import
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: realm
          configMap:
            name: keycloak-realm
