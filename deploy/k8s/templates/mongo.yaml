apiVersion: v1
kind: Service
metadata:
  name: mongo
  labels:
    {{- include "thunderbolt.labels" . | nindent 4 }}
spec:
  selector:
    app: mongo
  ports:
    - port: 27017
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  labels:
    {{- include "thunderbolt.labels" . | nindent 4 }}
spec:
  serviceName: mongo
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      {{- include "thunderbolt.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: mongo
          image: "{{ .Values.mongo.image.repository }}:{{ .Values.mongo.image.tag }}"
          args: ["--replSet", "rs0", "--bind_ip_all", "--quiet"]
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
          readinessProbe:
            exec:
              command: ["mongosh", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 10
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.mongo.storage }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: mongo-rs-init
  labels:
    {{- include "thunderbolt.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: hook-succeeded
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mongo-init
          image: "{{ .Values.mongo.image.repository }}:{{ .Values.mongo.image.tag }}"
          command:
            - bash
            - -c
            - |
              until mongosh --host mongo:27017 --eval "db.adminCommand('ping')" > /dev/null 2>&1; do
                echo "Waiting for mongo..."
                sleep 2
              done
              mongosh --host mongo:27017 --eval '
                try { rs.status().ok && quit(0) } catch {}
                rs.initiate({_id: "rs0", version: 1, members: [{_id: 0, host: "mongo-0.mongo:27017"}]})
              '
