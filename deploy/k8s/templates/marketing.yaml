apiVersion: v1
kind: Service
metadata:
  name: marketing
  labels:
    {{- include "thunderbolt.labels" . | nindent 4 }}
spec:
  selector:
    app: marketing
  ports:
    - port: {{ .Values.marketing.service.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketing
  labels:
    {{- include "thunderbolt.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.marketing.replicas }}
  selector:
    matchLabels:
      app: marketing
  template:
    metadata:
      labels:
        app: marketing
    spec:
      {{- include "thunderbolt.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: marketing
          image: "{{ .Values.marketing.image.repository }}:{{ .Values.marketing.image.tag }}"
          imagePullPolicy: {{ .Values.marketing.image.pullPolicy }}
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
