[package]
name = "thunderbolt"
version = "0.1.0"
description = "A Tauri App"
authors = ["you"]
edition = "2021"
default-run = "thunderbolt"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "thunderbolt_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[workspace]
members = ["thunderbolt_imap_client", "thunderbolt_imap_sync", "thunderbolt_embeddings", "thunderbolt_bridge"]

[workspace.dependencies]
# Use Thunderbird's fork with Windows build fix
# See: https://github.com/thunderbird/libsql/commit/91d0ff37dc37f2397b39662b0727b500a93fdb32
libsql = { git = "https://github.com/thunderbird/libsql", branch = "main", default-features = false, features = ["core", "encryption"] }
anyhow = "1.0.98"
serde = { version = "1.0.219", features = ["derive"] }
thunderbolt-lib = { path = "." }

[[bin]]
name = "thunderbolt"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2.2.0", features = [] }

# Common dependencies (no Metal features)
[dependencies]
tauri = { version = "2.5.1", features = [ "tray-icon", "devtools"] }
tauri-plugin-opener = "2.2.7"
tauri-plugin-shell = "2.2.1"
tauri-plugin-os = "2"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
imap = "3.0.0-alpha.15"
native-tls = "0.2.14"
dotenv = "0.15.0"
hf-hub = "0.4.2"
tokenizers = "0.21.1"
anyhow = "1.0.98"
tokio = "1.45.1"
chrono = { version = "0.4.41", features = ["serde"] }
html2text = "0.14.2"
tauri-plugin-devtools = "2.0.0"
tauri-plugin-http = "2.4.4"
tokio-stream = "0.1.17"
http = "1.3.1"
tauri-plugin-process = "2.2.1"
regex = "1.11.1"
keyring = { version = "3.6.2", features = [
    "apple-native",
    "windows-native",
    "sync-secret-service",
] }
tauri-plugin-fs = "2.3.0"
libsql = { workspace = true }
base64 = "0.22.1"
bytes = "1.10.1"
mail-parser = { version = "0.10.2", features = ["serde_support"] }
thunderbolt_imap_client = { path = "./thunderbolt_imap_client" }
thunderbolt_imap_sync = { path = "./thunderbolt_imap_sync" }
thunderbolt_embeddings = { path = "./thunderbolt_embeddings" }
thunderbolt_bridge = { path = "./thunderbolt_bridge" }
# MCP Server dependencies
axum = "0.7.9"
tower = "0.4.13"
tower-http = { version = "0.5.2", features = ["cors"] }
uuid = { version = "1.17.0", features = ["v4", "serde"] }
dashmap = "5.5.3"

[profile.dev]
incremental = true                              # Compile your binary in smaller steps.

[profile.dev.package]
"candle-nn" = { opt-level = 3, debug = false }
"candle-core" = { opt-level = 3, debug = false }
"candle-transformers" = { opt-level = 3, debug = false }

[profile.release]
codegen-units = 1 # Allows LLVM to perform better optimization.
lto = true        # Enables link-time-optimizations.
opt-level = "s"   # Prioritizes small binary size. Use `3` if you prefer speed.
panic = "abort"   # Higher performance by disabling panic handlers.
strip = true      # Ensures debug symbols are removed.
