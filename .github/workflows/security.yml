name: Security

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: ['**']
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep@sha256:a3d49dc967b8534a6a76628e50c51cbfe33eb7195dc2feab1fdc0f100852c8ef
    permissions:
      contents: read
      security-events: write
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Run Semgrep (full scan)
        if: github.event_name != 'pull_request'
        run: |
          semgrep scan \
            --config p/typescript \
            --config p/react \
            --config p/nodejs \
            --config p/owasp-top-ten \
            --config p/security-audit \
            --config p/secrets \
            --sarif-output semgrep.sarif

      - name: Run Semgrep (diff-aware)
        if: github.event_name == 'pull_request'
        run: |
          semgrep scan \
            --config p/typescript \
            --config p/react \
            --config p/nodejs \
            --config p/owasp-top-ten \
            --config p/security-audit \
            --config p/secrets \
            --baseline-commit ${{ github.event.pull_request.base.sha }} \
            --sarif-output semgrep.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3.35.1
        if: always() && hashFiles('semgrep.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: semgrep.sarif
