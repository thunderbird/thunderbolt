name: Claude Code Assistant

on:
  # Trigger on @claude mentions in comments and issues
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]
  # Automatic PR reviews when PRs are opened
  pull_request:
    types: [opened]

jobs:
  # Interactive @claude mentions
  claude-interactive:
    if: |
      github.event_name != 'pull_request' && (
        contains(github.event.comment.body, '@claude') ||
        contains(github.event.review.body, '@claude') ||
        contains(github.event.issue.title, '@claude') ||
        contains(github.event.issue.body, '@claude')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Execute Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.CI_ANTHROPIC_API_KEY }}

  # Automatic PR code reviews
  claude-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: PR Review with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.CI_ANTHROPIC_API_KEY }}
          prompt: '/review-pr REPO: ${{ github.repository }} PR_NUMBER: ${{ github.event.pull_request.number }}'
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
