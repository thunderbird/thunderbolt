name: Version Bump and Release Generation

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform for the release (all, ios, android, desktop)'
        required: false
        type: choice
        default: 'all'
        options:
          - all
          - ios
          - android
          - desktop
      version:
        description: 'Explicit version to set (e.g., 1.2.3). Overrides detection.'
        required: false
        type: string
      version_type:
        description: 'Type of version bump (patch, minor, major, auto)'
        required: false
        type: choice
        default: 'auto'
        options:
          - auto
          - patch
          - minor
          - major
  workflow_call:
    inputs:
      platform:
        description: 'Platform for the release (all, ios, android, desktop)'
        required: false
        type: string
        default: 'all'
      version:
        description: 'Explicit version to set (e.g., 1.2.3). Overrides detection.'
        required: false
        type: string
      version_type:
        description: 'Type of version bump (patch, minor, major, auto)'
        required: false
        type: string
        default: 'auto'
    outputs:
      new_version:
        description: 'The new version that was created'
        value: ${{ jobs.version_bump.outputs.new_version }}
      tag_name:
        description: 'The tag name that was created'
        value: ${{ jobs.version_bump.outputs.tag_name }}

jobs:
  version_bump:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      tag_name: ${{ steps.tag.outputs.tag_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Run create-release script
        run: |
          # Build arguments for the script
          ARGS="--push"

          if [ -n "${{ inputs.version }}" ]; then
            ARGS="$ARGS --version ${{ inputs.version }}"
          else
            ARGS="$ARGS --type ${{ inputs.version_type }}"
          fi

          if [ -n "${{ inputs.platform }}" ]; then
            ARGS="$ARGS --platform ${{ inputs.platform }}"
          fi

          echo "Running: bun run scripts/create-release.ts $ARGS"
          bun run scripts/create-release.ts $ARGS

      - name: Extract outputs
        id: version
        run: |
          # Get the version from package.json (which was just updated)
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $NEW_VERSION"

          # Output the version type
          VERSION_TYPE="${{ inputs.version_type }}"
          echo "version_type=$VERSION_TYPE" >> $GITHUB_OUTPUT
          echo "📝 Version type: $VERSION_TYPE"

      - name: Extract tag name
        id: tag
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          PLATFORM="${{ inputs.platform }}"

          # Determine tag name based on platform
          if [ "$PLATFORM" == "all" ]; then
            TAG_NAME="v$NEW_VERSION"
          else
            TAG_NAME="v$NEW_VERSION-$PLATFORM-rc"
          fi

          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "🏷️  Tag: $TAG_NAME"

      - name: Generate changelog
        id: changelog
        run: |
          TAG_NAME="${{ steps.tag.outputs.tag_name }}"
          # Find the previous version tag (excluding the one just created)
          PREV_TAG=$(git tag --sort=-creatordate | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | grep -v "${TAG_NAME}" | head -1 || true)

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found; using full history"
            git log --pretty=format:"- %s (%h) by %an" > changelog.txt
          else
            echo "Generating changelog since $PREV_TAG"
            git log --pretty=format:"- %s (%h) by %an" "$PREV_TAG..HEAD" > changelog.txt
          fi

          # Use base64 encoding to safely pass multiline content
          CHANGELOG_B64=$(base64 -w 0 changelog.txt)
          echo "changelog_b64=$CHANGELOG_B64" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        run: |
          # Decode the changelog
          CHANGELOG=$(echo "${{ steps.changelog.outputs.changelog_b64 }}" | base64 -d)

          PLATFORM="${{ inputs.platform }}"
          TAG_NAME="${{ steps.tag.outputs.tag_name }}"
          VERSION="${{ steps.version.outputs.new_version }}"
          VERSION_TYPE="${{ steps.version.outputs.version_type }}"

          # Create release using GitHub CLI
          if [ "$PLATFORM" == "all" ]; then
            # Unified release for all platforms
            gh release create "$TAG_NAME" \
              --title "Release $TAG_NAME" \
              --notes "## Release $TAG_NAME

          - Version: $VERSION
          - Version type: $VERSION_TYPE

          ## Changelog
          $CHANGELOG

          ### Platform Builds
          - ✅ Desktop: Building via CI
          - ✅ iOS: Building and deploying to TestFlight
          - ✅ Android: Building and deploying to Play Store (Internal)" \
              --draft \
              --prerelease
          else
            # Platform-specific RC release
            gh release create "$TAG_NAME" \
              --title "Release Candidate $TAG_NAME" \
              --notes "## Release Candidate $TAG_NAME

          This is a release candidate for $PLATFORM platform.

          - Version: $VERSION
          - Platform: $PLATFORM
          - Version type: $VERSION_TYPE

          ## Changelog
          $CHANGELOG

          ### Next Steps
          After successful build and testing, the final release will be created." \
              --draft \
              --prerelease
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
