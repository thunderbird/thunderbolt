name: Security

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: ['**']
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep@sha256:a3d49dc967b8534a6a76628e50c51cbfe33eb7195dc2feab1fdc0f100852c8ef
    permissions:
      contents: read
      security-events: write
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Run Semgrep (full scan)
        if: github.event_name != 'pull_request'
        run: |
          semgrep scan \
            --config p/typescript \
            --config p/react \
            --config p/nodejs \
            --config p/owasp-top-ten \
            --config p/security-audit \
            --config p/secrets \
            --sarif-output semgrep.sarif

      - name: Run Semgrep (diff-aware)
        if: github.event_name == 'pull_request'
        run: |
          semgrep scan \
            --config p/typescript \
            --config p/react \
            --config p/nodejs \
            --config p/owasp-top-ten \
            --config p/security-audit \
            --config p/secrets \
            --baseline-commit ${{ github.event.pull_request.base.sha }} \
            --sarif-output semgrep.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3.35.1
        if: always()
        continue-on-error: true
        with:
          sarif_file: semgrep.sarif

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    if: vars.DISABLE_CODEQL != 'true'
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3.35.1
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3.35.1

  gitleaks:
    name: Secret Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz -o gitleaks.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tar.gz" | sha256sum -c
          tar xzf gitleaks.tar.gz
          sudo mv gitleaks /usr/local/bin/

      - name: Detect secrets
        run: gitleaks detect --source . --verbose --log-opts "${{ github.event.pull_request.base.sha }}..${{ github.sha }}"
        if: github.event_name == 'pull_request'

      - name: Detect secrets (full scan)
        run: gitleaks detect --source . --verbose
        if: github.event_name != 'pull_request'

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          comment-summary-in-pr: always
          fail-on-severity: critical
