[install]
minimumReleaseAge = 604800 # 7 days in seconds
# The Pi harness packages (the in-browser agent engine) are actively released and
# pinned to an exact version (0.80.2), so the 7-day quarantine — meant to avoid
# auto-pulling brand-new floating versions — would otherwise block this exact pin.
# Scope the exemption to the `@earendil-works/*` packages only; the global
# quarantine stays in force for every other dependency.
minimumReleaseAgeExcludes = [
  "@earendil-works/pi-agent-core",
  "@earendil-works/pi-ai",
  "@earendil-works/pi-coding-agent",
]

[test]
preload = ["./happydom.ts", "./src/testing-library.ts"]
# Bun walks cwd recursively to discover test files. From the repo root that pulls in
# `backend/src/**/*.test.ts` and `e2e/**/*.spec.ts` — neither belongs in the frontend
# runner. Backend has its own `bunfig.toml` and `cd backend && bun test` flow; e2e is
# Playwright. Requires Bun ≥ 1.3.11 (silent no-op below); CI is 1.3.13.
pathIgnorePatterns = ["backend/**", "e2e/**"]
